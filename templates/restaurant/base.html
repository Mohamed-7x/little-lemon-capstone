<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Lemon - {% block title %}{% endblock %}</title>
    {% load static %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; color: #333; }

        /* Navbar */
        nav {
            background: #495E57;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { color: #F4CE14; font-size: 1.8rem; font-weight: bold; text-decoration: none; }
        .logo span { color: #EDEFEE; font-size: 1rem; font-weight: normal; margin-left: 0.5rem; }
        nav ul { list-style: none; display: flex; gap: 2rem; }
        nav ul a { color: #EDEFEE; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav ul a:hover { color: #F4CE14; }

        /* Hero */
        .hero {
            background: #495E57;
            color: #EDEFEE;
            padding: 4rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
        }
        .hero-text h1 { color: #F4CE14; font-size: 3rem; }
        .hero-text h2 { font-size: 1.5rem; margin-bottom: 1rem; }
        .hero-text p { max-width: 400px; line-height: 1.6; margin-bottom: 2rem; }

        /* Buttons */
        .btn {
            background: #F4CE14;
            color: #333;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #ddb810; }

        /* Content */
        .content { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }
        h2.section-title { font-size: 2rem; color: #495E57; margin-bottom: 1.5rem; }

        /* Footer */
        footer {
            background: #333;
            color: #EDEFEE;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Little Lemon <span>Chicago</span></a>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about/">About</a></li>
            <li><a href="/menu/">Menu</a></li>
            <li><a href="/book/">Book a Table</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <p>&copy; 2024 Little Lemon Restaurant. All rights reserved.</p>
    </footer>
</body>
</html>
